spring.application.name=backend

# Server
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# Actuator
management.endpoints.web.exposure.include=health,info

# MyBatis
mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# DataSource (local)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fishing?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:fishing}
spring.datasource.password=${DB_PASSWORD:fishing}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SQL init
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
